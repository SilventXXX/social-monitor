# 外网信息监控系统 - 监控配置
# 混合方案：AI 智能评分 + 关键词预过滤

monitor:
  # 【AI 智能评分】用自然语言描述你的监控需求
  # AI 会据此对内容打相关性分，写得越具体，过滤效果越好
  requirements: "我做AI社交产品，关注AI帮助真人连接的社交产品动态，主要是三类 1. AI社交助理、分身类产品，比如pika AI Self、secondme这种 2. A2A的社交网络，比如Elys等 3. 通用AI Agent在社交上的尝试，比如openclaw及moltbook之类的进展"

  # 【关键词预过滤】已禁用，使用纯 AI 评分模式
  # 如需启用预过滤，取消下面注释并填写关键词
  keywords: []
  # keywords:
  #   - "AI分身"
  #   - "digital twin"
  #   - "Pika AI"
  #   - "AI Self"
  #   - "AI avatar"
  #   - "数字孪生"
  #   - "AI clone"
  #   - "Elys AI"
  #   - "AI陪伴"
  #   - "Character.AI"
  #   - "AI agent"
  #   - "LLM"
  #   - "RAG"

  # 要监控的用户名/品牌（在各平台搜索提及）
  usernames:
    - "pika_labs"
    - "demi_guo_"
    - "borndotcom"

  # Hashtag（仅 X/Twitter）
  hashtags:
    - "AISelf"
    - "DigitalTwin"
    - "AIAvatar"
    - "AI"

  # Reddit 要监控的 subreddit
  subreddits:
    - "artificial"
    - "MachineLearning"
    - "singularity"
    - "LocalLLaMA"
    - "OpenAI"
    - "ChatGPT"

  # AI 评分达到多少才推送飞书通知（0-100，建议 60）
  min_score_to_notify: 60

  # 自定义 RSS 信息源（可选，在默认源基础上追加）
  rss_feeds:
    # === YouTube 频道（本地RSSHub） ===
    - name: "YouTube-LexFridman-AI"
      url: "http://localhost:1200/youtube/playlist/PLrAXtmErZgOeiKm4sgNOknGvNjby9efdf"
    - name: "YouTube-Fireship"
      url: "http://localhost:1200/youtube/channel/UCsBjURrPoezykLs9EqgamOA"
    # === AI从业者Blog ===
    - name: "Blog-SimonWillison"
      url: "https://simonwillison.net/atom/everything/"
    - name: "Blog-LennysNewsletter"
      url: "https://www.lennysnewsletter.com/feed"
    # === Reddit（直接RSS，无需API） ===
    - name: "Reddit-r/artificial"
      url: "https://www.reddit.com/r/artificial/.rss"
    - name: "Reddit-r/singularity"
      url: "https://www.reddit.com/r/singularity/.rss"
    - name: "Reddit-r/ChatGPT"
      url: "https://www.reddit.com/r/ChatGPT/.rss"
